<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AMU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: #15131f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signup-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            height: 600px;
        }

        /* ===== LEFT PANEL ===== */
        .left-panel {
            background: #221a40;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: white;
        }

        .left-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-box {
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .decorative-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
        }

        .blob1 {
            width: 200px;
            height: 200px;
            background: #a78bfa;
            top: -50px;
            right: -80px;
        }

        .blob2 {
            width: 150px;
            height: 150px;
            background: #c084fc;
            bottom: 100px;
            left: -30px;
        }

        .blob3 {
            width: 100px;
            height: 100px;
            background: #a78bfa;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .landscape {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to top, #0f0d17 0%, transparent 100%);
            clip-path: polygon(
                0% 100%,
                0% 70%,
                5% 65%,
                10% 75%,
                15% 60%,
                20% 70%,
                25% 55%,
                30% 65%,
                35% 50%,
                40% 60%,
                45% 55%,
                50% 65%,
                55% 50%,
                60% 60%,
                65% 55%,
                70% 65%,
                75% 60%,
                80% 70%,
                85% 65%,
                90% 75%,
                95% 70%,
                100% 100%
            );
        }

        .left-bottom {
            position: relative;
            z-index: 10;
        }

        .tagline {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .slide-indicators {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: white;
            width: 20px;
            border-radius: 4px;
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel {
            background: #1e1c2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            color: white;
            overflow-y: auto;
        }

        .form-header {
            margin-bottom: 30px;
        }

        .form-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #9ca3af;
            font-size: 14px;
        }

        .form-subtitle a {
            color: #a78bfa;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .form-subtitle a:hover {
            color: #c084fc;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #272438;
            border: 1px solid #3f3a52;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #9ca3af;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #a78bfa;
            background: #2d2640;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #a78bfa;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 24px;
            margin-top: 20px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #7c3aed;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-label {
            font-size: 13px;
            color: #d1d5db;
            cursor: pointer;
            line-height: 1.4;
        }

        .checkbox-label a {
            color: #a78bfa;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .checkbox-label a:hover {
            color: #c084fc;
        }

        .submit-button {
            width: 100%;
            padding: 12px;
            background: #7c3aed;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .submit-button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        .field-error {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .field-error.show {
            display: block;
        }

        @media (max-width: 768px) {
            .signup-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .left-panel {
                display: none;
            }

            .right-panel {
                justify-content: flex-start;
                padding: 30px 20px;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="left-top">
                <div class="logo-box">AMU</div>
                <button class="back-button">Back to website →</button>
            </div>

            <div class="decorative-shapes">
                <div class="blob blob1"></div>
                <div class="blob blob2"></div>
                <div class="blob blob3"></div>
                <div class="landscape"></div>
            </div>

            <div class="left-bottom">
                <p class="tagline">Capturing Moments, Creating Memories</p>
                <div class="slide-indicators">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <form id="signupForm">
                <div class="form-header">
                    <h1 class="form-title">Create an account</h1>
                    <p class="form-subtitle">Already have an account? <a href="#" onclick="handleLogin(); return false;">Log in</a></p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First name</label>
                        <input type="text" id="firstName" name="firstName" value="Fletcher" placeholder="Enter first name">
                        <div class="field-error" data-field="firstName"></div>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Enter last name">
                        <div class="field-error" data-field="lastName"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                    <div class="field-error" data-field="email"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter password (min 6 characters)">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">👁️</button>
                    </div>
                    <div class="field-error" data-field="password"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms" class="checkbox-label">
                        I agree to the <a href="#" onclick="return false;">Terms & Conditions</a>
                    </label>
                    <div class="field-error" data-field="terms"></div>
                </div>

                <button type="submit" class="submit-button">Create account</button>

                <div class="message" id="message"></div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggle = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        function handleLogin() {
            alert('Redirecting to login page...');
            // In a real app, this would redirect to /login
        }

        function validateForm() {
            clearMessages();
            let isValid = true;
            const errors = {};

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const termsChecked = document.getElementById('terms').checked;

            // Validate first name
            if (!firstName) {
                errors.firstName = 'First name is required';
                isValid = false;
            }

            // Validate last name
            if (!lastName) {
                errors.lastName = 'Last name is required';
                isValid = false;
            }

            // Validate email
            if (!email) {
                errors.email = 'Email is required';
                isValid = false;
            } else if (!email.includes('@')) {
                errors.email = 'Please enter a valid email address';
                isValid = false;
            }

            // Validate password
            if (!password) {
                errors.password = 'Password is required';
                isValid = false;
            } else if (password.length < 6) {
                errors.password = 'Password must be at least 6 characters';
                isValid = false;
            }

            // Validate terms
            if (!termsChecked) {
                errors.terms = 'You must agree to the Terms & Conditions';
                isValid = false;
            }

            // Display errors
            Object.keys(errors).forEach(field => {
                const errorElement = document.querySelector(`[data-field="${field}"]`);
                if (errorElement) {
                    errorElement.textContent = errors[field];
                    errorElement.classList.add('show');
                }
            });

            return isValid;
        }

        function clearMessages() {
            const fieldErrors = document.querySelectorAll('.field-error');
            fieldErrors.forEach(error => {
                error.textContent = '';
                error.classList.remove('show');
            });
            messageDiv.textContent = '';
            messageDiv.className = 'message';
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            if (validateForm()) {
                messageDiv.textContent = '✓ Account created successfully! Welcome aboard.';
                messageDiv.className = 'message success';
                
                // Reset form after 2 seconds
                setTimeout(() => {
                    form.reset();
                    document.getElementById('firstName').value = 'Fletcher';
                    clearMessages();
                }, 2000);
            } else {
                messageDiv.textContent = '✗ Please fix the errors above';
                messageDiv.className = 'message error';
            }
        });

        // Scroll message into view
        form.addEventListener('submit', function() {
            setTimeout(() => {
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        });
    </script>
</body>
</html>
