<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a1f2b; /* dark blue like Discord */
      height: 100vh;
      font-family: sans-serif;
    }

    .logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo">APP</div>
</body>
</html>
